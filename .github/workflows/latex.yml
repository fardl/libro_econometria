name: Compilar PDF LaTeX

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Compilar documento LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Copiar PDF a docs
        run: |
          mkdir -p docs
          cp main.pdf docs/main.pdf

      - name: Subir PDF actualizado al repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f docs/main.pdf
          git commit -m "Actualiza PDF generado" || echo "No hay cambios en el PDF"
          git push